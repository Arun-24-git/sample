<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slither.io Clone</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let snake = [{ x: canvas.width / 2, y: canvas.height / 2 }];
        let food = getRandomPosition();
        let direction = { x: 0, y: 0 };
        let speed = 5;
        let snakeLength = 10;

        document.addEventListener("mousemove", (event) => {
            let angle = Math.atan2(event.clientY - snake[0].y, event.clientX - snake[0].x);
            direction.x = Math.cos(angle) * speed;
            direction.y = Math.sin(angle) * speed;
        });

        function update() {
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            snake.unshift(head);

            if (snake.length > snakeLength) {
                snake.pop();
            }

            if (Math.hypot(head.x - food.x, head.y - food.y) < 10) {
                food = getRandomPosition();
                snakeLength += 5;
            }

            if (head.x < 0 || head.x > canvas.width || head.y < 0 || head.y > canvas.height) {
                resetGame();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(food.x, food.y, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "lime";
            for (let i = 0; i < snake.length; i++) {
                ctx.beginPath();
                ctx.arc(snake[i].x, snake[i].y, 8, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function getRandomPosition() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
            };
        }

        function resetGame() {
            snake = [{ x: canvas.width / 2, y: canvas.height / 2 }];
            snakeLength = 10;
            direction = { x: 0, y: 0 };
            food = getRandomPosition();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
